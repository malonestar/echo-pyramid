display:
  - platform: mipi_spi
    id: atoms3r_lcd
    model: ST7789V
    dc_pin: GPIO42
    reset_pin: GPIO48
    cs_pin: GPIO14
    data_rate: 40MHz
    dimensions:
      height: 128
      width: 128
      offset_width: 2
      offset_height: 1

    invert_colors: true
    rotation: 0°
    pages:
      - id: idle_page
        lambda: |-
          it.fill(id(idle_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_idle), ImageAlign::CENTER);
      - id: listening_page
        lambda: |-
          it.fill(id(listening_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_listening), ImageAlign::CENTER);
      - id: thinking_page
        lambda: |-
          it.fill(id(thinking_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_thinking), ImageAlign::CENTER);
      - id: replying_page
        lambda: |-
          it.fill(id(replying_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_replying), ImageAlign::CENTER);
      - id: error_page
        lambda: |-
          it.fill(id(error_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_error), ImageAlign::CENTER);
      - id: no_ha_page
        lambda: |-
          it.image((it.get_width() / 2), (it.get_height() / 2), id(error_no_ha), ImageAlign::CENTER);
      - id: no_wifi_page
        lambda: |-
          it.image((it.get_width() / 2), (it.get_height() / 2), id(error_no_wifi), ImageAlign::CENTER);
      - id: initializing_page
        lambda: |-
          it.fill(id(loading_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_initializing), ImageAlign::CENTER);
      - id: timer_finished_page
        lambda: |-
          it.fill(Color::BLACK);
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_timer_finished), ImageAlign::CENTER);
      - id: muted_page
        lambda: |-
          it.fill(Color::BLACK);
          it.printf(0, 0, id(mdi_icon_128), Color::WHITE, "%s", "\U000F036D");

script:
  # Starts either mWW or the streaming wake word, depending on the configured location
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: |-
                  return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: |-
                  return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
  # Stops either mWW or the streaming wake word, depending on the configured location
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: |-
              return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: |-
              return id(wake_word_engine_location).current_option() == "On device";
          then:
            - micro_wake_word.stop:
  # Set the voice assistant phase to idle or muted, depending on if the software mute switch is activated
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
            - script.execute: idle_sleep_timer
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};

  - id: play_sound
    parameters:
      priority: bool
      sound_file: "audio::AudioFile*"
    then:
      - lambda: |-
          if (priority) {
            id(echo_pyramid_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP)
              .set_announcement(true)
              .perform();
          }
          if ( (id(echo_pyramid_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING ) || priority) {
            id(echo_pyramid_player)
              ->play_file(sound_file, true, false);
          }

  - id: rainbow_animation
    then:
      - while:
          condition:
            switch.is_on: party_mode_switch
          then:
            - lambda: |-
                // 8 evenly-spaced rainbow hues
                const float colors[8][3] = {
                  {1.0f, 0.0f, 0.0f},  // 0: Red
                  {1.0f, 0.4f, 0.0f},  // 1: Orange
                  {1.0f, 0.9f, 0.0f},  // 2: Yellow
                  {0.0f, 1.0f, 0.0f},  // 3: Green
                  {0.0f, 1.0f, 0.9f},  // 4: Cyan
                  {0.0f, 0.2f, 1.0f},  // 5: Blue
                  {0.6f, 0.0f, 1.0f},  // 6: Violet
                  {1.0f, 0.0f, 0.7f},  // 7: Magenta
                };
                // Clockwise corner order: FL=0, FR=1, BR=2, BL=3
                // Formula: color_index = (step - corner*2 + 16) % 8
                // This makes colors travel FL→FR→BR→BL (clockwise) as step increments.
                // Adjacent corners are always 2 hues apart, so 4 different colors show at once.
                int s = id(party_step);
                auto apply = [&](light::LightState* l, int corner) {
                  int ci = (s - corner * 2 + 16) % 8;
                  auto call = l->turn_on();
                  call.set_rgb(colors[ci][0], colors[ci][1], colors[ci][2]);
                  call.set_brightness(0.90f);
                  call.set_transition_length(180);
                  call.perform();
                };
                apply(id(strip1_group2), 0);  // front-left
                apply(id(strip2_group1), 1);  // front-right
                apply(id(strip2_group2), 2);  // back-right
                apply(id(strip1_group1), 3);  // back-left
                id(party_step) = (s + 1) % 8;
            - delay: 220ms
      # Restore normal LED state when party mode ends
      - script.execute: draw_display

  - id: wake_word_sweep
    then:
      # Step 1: Front corners ignite first (user-facing side)
      - light.turn_on:
          id: strip1_group2
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 1.0
          transition_length: 40ms
      - light.turn_on:
          id: strip2_group1
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 1.0
          transition_length: 40ms
      - delay: 110ms
      # Step 2: Back corners follow — base-to-top wave completes
      - light.turn_on:
          id: strip1_group1
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 1.0
          transition_length: 40ms
      - light.turn_on:
          id: strip2_group2
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 1.0
          transition_length: 40ms
      # Hold at full white — on_listening fires next and transitions to cyan via draw_display

  - id: thinking_animation
    then:
      # Clockwise amber chase: front-left → front-right → back-right → back-left
      # One full rotation ~760ms. Stops cleanly when phase changes (via script.stop in update_leds).
      - while:
          condition:
            lambda: return id(voice_assistant_phase) == ${voice_assist_thinking_phase_id};
          then:
            - light.turn_on:
                id: strip1_group2
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.90
                transition_length: 100ms
            - light.turn_on:
                id: strip2_group1
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.28
                transition_length: 100ms
            - light.turn_on:
                id: strip2_group2
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.08
                transition_length: 100ms
            - light.turn_on:
                id: strip1_group1
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.08
                transition_length: 100ms
            - delay: 190ms
            - light.turn_on:
                id: strip2_group1
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.90
                transition_length: 100ms
            - light.turn_on:
                id: strip2_group2
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.28
                transition_length: 100ms
            - light.turn_on:
                id: strip1_group1
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.08
                transition_length: 100ms
            - light.turn_on:
                id: strip1_group2
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.08
                transition_length: 100ms
            - delay: 190ms
            - light.turn_on:
                id: strip2_group2
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.90
                transition_length: 100ms
            - light.turn_on:
                id: strip1_group1
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.28
                transition_length: 100ms
            - light.turn_on:
                id: strip1_group2
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.08
                transition_length: 100ms
            - light.turn_on:
                id: strip2_group1
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.08
                transition_length: 100ms
            - delay: 190ms
            - light.turn_on:
                id: strip1_group1
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.90
                transition_length: 100ms
            - light.turn_on:
                id: strip1_group2
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.28
                transition_length: 100ms
            - light.turn_on:
                id: strip2_group1
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.08
                transition_length: 100ms
            - light.turn_on:
                id: strip2_group2
                red: 1.0
                green: 0.90
                blue: 0.0
                brightness: 0.08
                transition_length: 100ms
            - delay: 190ms

  - id: listening_pulse
    then:
      # All 4 strips breathe together: 100%↔50% cyan. ~2.3s cycle.
      # while condition exits cleanly the moment phase leaves listening.
      - while:
          condition:
            lambda: return id(voice_assistant_phase) == ${voice_assist_listening_phase_id};
          then:
            # Inhale — brighten to 100%
            - light.turn_on:
                id: strip1_group1
                red: 0.0
                green: 0.8
                blue: 1.0
                brightness: 1.0
                transition_length: 900ms
            - light.turn_on:
                id: strip1_group2
                red: 0.0
                green: 0.8
                blue: 1.0
                brightness: 1.0
                transition_length: 900ms
            - light.turn_on:
                id: strip2_group1
                red: 0.0
                green: 0.8
                blue: 1.0
                brightness: 1.0
                transition_length: 900ms
            - light.turn_on:
                id: strip2_group2
                red: 0.0
                green: 0.8
                blue: 1.0
                brightness: 1.0
                transition_length: 900ms
            - delay: 1000ms
            # Exhale — dim to 50% (slightly slower for natural feel)
            - light.turn_on:
                id: strip1_group1
                red: 0.0
                green: 0.8
                blue: 1.0
                brightness: 0.50
                transition_length: 1100ms
            - light.turn_on:
                id: strip1_group2
                red: 0.0
                green: 0.8
                blue: 1.0
                brightness: 0.50
                transition_length: 1100ms
            - light.turn_on:
                id: strip2_group1
                red: 0.0
                green: 0.8
                blue: 1.0
                brightness: 0.50
                transition_length: 1100ms
            - light.turn_on:
                id: strip2_group2
                red: 0.0
                green: 0.8
                blue: 1.0
                brightness: 0.50
                transition_length: 1100ms
            - delay: 1300ms

  - id: draw_display
    then:
      - script.execute: update_leds
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        api.connected:
                      then:
                        - lambda: |
                            switch(id(voice_assistant_phase)) {
                              case ${voice_assist_listening_phase_id}:
                                id(atoms3r_lcd).show_page(listening_page);
                                id(atoms3r_lcd).update();
                                break;
                              case ${voice_assist_thinking_phase_id}:
                                id(atoms3r_lcd).show_page(thinking_page);
                                id(atoms3r_lcd).update();
                                break;
                              case ${voice_assist_replying_phase_id}:
                                id(atoms3r_lcd).show_page(replying_page);
                                id(atoms3r_lcd).update();
                                break;
                              case ${voice_assist_error_phase_id}:
                                id(atoms3r_lcd).show_page(error_page);
                                id(atoms3r_lcd).update();
                                break;
                              case ${voice_assist_timer_finished_phase_id}:
                                id(atoms3r_lcd).show_page(timer_finished_page);
                                id(atoms3r_lcd).update();
                                break;
                              case ${voice_assist_muted_phase_id}:
                                id(atoms3r_lcd).show_page(muted_page);
                                id(atoms3r_lcd).update();
                                break;
                              case ${voice_assist_not_ready_phase_id}:
                                id(atoms3r_lcd).show_page(no_ha_page);
                                id(atoms3r_lcd).update();
                                break;
                              default:
                                id(atoms3r_lcd).show_page(idle_page);
                                id(atoms3r_lcd).update();
                            }
                      else:
                        - display.page.show: no_ha_page
                        - component.update: atoms3r_lcd
                else:
                  - display.page.show: no_wifi_page
                  - component.update: atoms3r_lcd
          else:
            - display.page.show: initializing_page
            - component.update: atoms3r_lcd

  - id: update_leds
    then:
      - script.stop: thinking_animation
      - lambda: |-
          auto set_strip = [](light::LightState* l, float r, float g, float b, float brightness, uint32_t transition_ms) {
            auto call = l->turn_on();
            call.set_rgb(r, g, b);
            call.set_brightness(brightness);
            call.set_transition_length(transition_ms);
            call.perform();
          };
          auto strip_off = [](light::LightState* l, uint32_t transition_ms) {
            auto call = l->turn_off();
            call.set_transition_length(transition_ms);
            call.perform();
          };
          switch (id(voice_assistant_phase)) {
            case 1: // idle — cool blue, all strips
              set_strip(id(strip1_group1), 0.1, 0.2, 1.0, 0.51, 1000);
              set_strip(id(strip1_group2), 0.1, 0.2, 1.0, 0.51, 1000);
              set_strip(id(strip2_group1), 0.1, 0.2, 1.0, 0.51, 1000);
              set_strip(id(strip2_group2), 0.1, 0.2, 1.0, 0.51, 1000);
              break;
            case 2: // listening — bright cyan, front full, back half (toward user)
              set_strip(id(strip1_group2), 0.0, 0.8, 1.0, 0.90, 200); // front left
              set_strip(id(strip2_group1), 0.0, 0.8, 1.0, 0.90, 200); // front right
              set_strip(id(strip1_group1), 0.0, 0.8, 1.0, 0.45, 200); // back left
              set_strip(id(strip2_group2), 0.0, 0.8, 1.0, 0.45, 200); // back right
              break;
            case 3: // thinking — yellow
              set_strip(id(strip1_group1), 1.0, 0.90, 0.0, 0.65, 400);
              set_strip(id(strip1_group2), 1.0, 0.90, 0.0, 0.65, 400);
              set_strip(id(strip2_group1), 1.0, 0.90, 0.0, 0.65, 400);
              set_strip(id(strip2_group2), 1.0, 0.90, 0.0, 0.65, 400);
              break;
            case 4: // replying — soft green
              set_strip(id(strip1_group1), 0.0, 1.0, 0.3, 0.70, 300);
              set_strip(id(strip1_group2), 0.0, 1.0, 0.3, 0.70, 300);
              set_strip(id(strip2_group1), 0.0, 1.0, 0.3, 0.70, 300);
              set_strip(id(strip2_group2), 0.0, 1.0, 0.3, 0.70, 300);
              break;
            case 10: // not ready — off
              strip_off(id(strip1_group1), 500);
              strip_off(id(strip1_group2), 500);
              strip_off(id(strip2_group1), 500);
              strip_off(id(strip2_group2), 500);
              break;
            case 11: // error — red
              set_strip(id(strip1_group1), 1.0, 0.0, 0.0, 0.85, 100);
              set_strip(id(strip1_group2), 1.0, 0.0, 0.0, 0.85, 100);
              set_strip(id(strip2_group1), 1.0, 0.0, 0.0, 0.85, 100);
              set_strip(id(strip2_group2), 1.0, 0.0, 0.0, 0.85, 100);
              break;
            case 12: // muted — dim magenta
              set_strip(id(strip1_group1), 0.8, 0.0, 0.4, 0.06, 400);
              set_strip(id(strip1_group2), 0.8, 0.0, 0.4, 0.06, 400);
              set_strip(id(strip2_group1), 0.8, 0.0, 0.4, 0.06, 400);
              set_strip(id(strip2_group2), 0.8, 0.0, 0.4, 0.06, 400);
              break;
            case 20: // timer finished — alarm orange
              set_strip(id(strip1_group1), 1.0, 0.3, 0.0, 0.95, 100);
              set_strip(id(strip1_group2), 1.0, 0.3, 0.0, 0.95, 100);
              set_strip(id(strip2_group1), 1.0, 0.3, 0.0, 0.95, 100);
              set_strip(id(strip2_group2), 1.0, 0.3, 0.0, 0.95, 100);
              break;
            default:
              strip_off(id(strip1_group1), 500);
              strip_off(id(strip1_group2), 500);
              strip_off(id(strip2_group1), 500);
              strip_off(id(strip2_group2), 500);
              break;
          }

  # Idle sleep: after 2 minutes of idle, fade out backlight and all LED strips.
  # mode: restart ensures any new idle entry resets the countdown.
  - id: idle_sleep_timer
    mode: restart
    then:
      - delay: 2min
      - if:
          condition:
            lambda: return id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
          then:
            - light.turn_off:
                id: lcd_backlight
                transition_length: 3s
            - light.turn_off:
                id: strip1_group1
                transition_length: 3s
            - light.turn_off:
                id: strip1_group2
                transition_length: 3s
            - light.turn_off:
                id: strip2_group1
                transition_length: 3s
            - light.turn_off:
                id: strip2_group2
                transition_length: 3s

  # Wake from sleep: cancel the idle timer and restore the backlight.
  # LEDs are restored by wake_word_sweep / update_leds immediately after.
  - id: wake_from_sleep
    then:
      - script.stop: idle_sleep_timer
      - light.turn_on:
          id: lcd_backlight
          transition_length: 300ms

